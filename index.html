<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рулетка призов</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  padding-top: 40px;
}

.roulette {
  width: 100%;
  overflow: hidden;
  position: relative;
  border-top: 2px solid #1e293b;
  border-bottom: 2px solid #1e293b;
}

.track {
  display: flex;
}

.item {
  min-width: 220px;
  padding: 20px;
  text-align: center;
}

.item img {
  width: 120px;
}

.center-line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
  transform: translateX(-50%);
}

button {
  margin-top: 30px;
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.win-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
</style>
</head>
<body>

<div class="container">
  <h1>Испытай удачу</h1>
  <div class="roulette">
    <div class="track" id="track"></div>
    <div class="center-line"></div>
  </div>
  <button id="spinBtn">Крутить</button>
</div>

<div class="win-screen" id="winScreen">
  <h1>Вы выиграли!</h1>
  <button>Забрать приз!</button>
</div>

<script>
const prizes = [
  'iPhone 17 Pro',
  'iPhone 17 Pro Max',
  'MacBook Air',
  'MacBook Pro',
  'Dyson Фен',
  'Apple Watch 11',
  'Apple Watch Ultra'
];

const track = document.getElementById('track');
const btn = document.getElementById('spinBtn');
const winScreen = document.getElementById('winScreen');

// создаём длинную ленту
let items = [];
for (let i = 0; i < 30; i++) {
  const prize = prizes[i % prizes.length];
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `<img src="https://via.placeholder.com/120"><p>${prize}</p>`;
  track.appendChild(div);
  items.push(div);
}

let spins = 0;
let currentX = 0;

btn.addEventListener('click', () => {
  if (btn.disabled) return;

  spins++;

  const itemWidth = 220;
  const center = window.innerWidth / 2;

  let targetIndex;

  if (spins < 3) {
    targetIndex = Math.floor(Math.random() * items.length);
  } else {
    targetIndex = 10; // фиксированный выигрыш
  }

  const targetX = -(targetIndex * itemWidth - center + itemWidth / 2);

  animateSpin(currentX, targetX, 4000 + spins * 1000);

  currentX = targetX;

  if (spins === 3) {
    setTimeout(() => {
      winScreen.style.display = 'flex';
      btn.disabled = true;
    }, 6000);
  }
});

function animateSpin(start, end, duration) {
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function frame(time) {
    const progress = (time - startTime) / duration;
    const eased = easeOut(Math.min(progress, 1));

    const value = start + (end - start) * eased;
    track.style.transform = `translateX(${value}px)`;

    if (progress < 1) {
      requestAnimationFrame(frame);
    }
  }

  requestAnimationFrame(frame);
}
</script>

</body>
</html>
