<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рулетка призов</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  text-align: center;
}

.roulette {
  width: 320px;
  overflow: hidden;
  border-radius: 16px;
  border: 2px solid #1e293b;
  margin: 20px auto;
}

.track {
  display: flex;
  transition: transform 2s cubic-bezier(.25,.8,.25,1);
}

.item {
  min-width: 320px;
  padding: 20px;
  background: #1e293b;
}

.item img {
  width: 150px;
  height: auto;
}

button {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #475569;
}

.win-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  background: red;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-100px);} 
  100% {transform: translateY(100vh);} 
}
</style>
</head>
<body>

<div class="container">
  <h1>Испытай удачу</h1>
  <div class="roulette">
    <div class="track" id="track">
      <div class="item"><img src="https://via.placeholder.com/150"><p>iPhone 17 Pro</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>iPhone 17 Pro Max</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>MacBook Air</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>MacBook Pro</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>Dyson Фен</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>Apple Watch 11</p></div>
      <div class="item"><img src="https://via.placeholder.com/150"><p>Apple Watch Ultra</p></div>
    </div>
  </div>
  <button id="spinBtn">Крутить</button>
</div>

<div class="win-screen" id="winScreen">
  <h1>Вы выиграли!</h1>
  <button>Забрать приз!</button>
</div>

<script>
let spins = 0;
const track = document.getElementById('track');
const btn = document.getElementById('spinBtn');
const winScreen = document.getElementById('winScreen');

btn.addEventListener('click', () => {
  spins++;

  let position;

  if (spins < 3) {
    position = Math.floor(Math.random() * 7);
  } else {
    position = 1; // гарантированный "выигрыш"
  }

  track.style.transform = `translateX(-${position * 320}px)`;

  if (spins === 3) {
    setTimeout(() => {
      showWin();
    }, 2000);
    btn.disabled = true;
  }
});

function showWin() {
  winScreen.style.display = 'flex';

  for (let i = 0; i < 50; i++) {
    const conf = document.createElement('div');
    conf.classList.add('confetti');
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
    conf.style.animationDuration = (Math.random()*2+2) + 's';
    document.body.appendChild(conf);
  }
}
</script>

</body>
</html>
