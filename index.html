<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Крути колесо удачи</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f001a, #1a0033, #2a004d);
      color: #f0e6ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    h1 {
      font-size: 3.2rem;
      margin: 0.4em 0 0.8em;
      background: linear-gradient(90deg, #ff6bcb, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(167,139,250,0.6);
    }

    #wheel-container {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 2rem 0;
    }

    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #111;
      box-shadow: 
        0 0 50px rgba(200,100,255,0.6),
        inset 0 0 40px rgba(0,0,0,0.8);
      transition: transform 5s cubic-bezier(0.21, 0.53, 0.29, 0.99);
      transform: rotate(0deg);
      overflow: hidden;
    }

    .slice {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-origin: 50% 50%;
      clip-path: polygon(50% 50%, 100% 0%, 100% 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px black, 1px 1px 3px black;
    }

    .slice-text {
      transform: translateX(-40px) rotate(90deg);
      white-space: nowrap;
    }

    .pointer {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-bottom: 48px solid #ffeb3b;
      filter: drop-shadow(0 4px 12px #ffeb3b88);
      z-index: 10;
    }

    #spin-btn {
      margin-top: 1rem;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(45deg, #ff3366, #cc33ff);
      border: none;
      border-radius: 999px;
      box-shadow: 0 8px 30px rgba(204,51,255,0.55);
      cursor: pointer;
      transition: all 0.3s;
    }

    #spin-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 14px 40px rgba(204,51,255,0.75);
    }

    #spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #result {
      margin: 1.5rem 0;
      font-size: 2.1rem;
      font-weight: bold;
      min-height: 3rem;
      text-align: center;
      text-shadow: 0 0 15px rgba(255,255,255,0.7);
    }

    #congrats {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,5,30,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #congrats h2 {
      font-size: 4.5rem;
      margin-bottom: 1.2rem;
      background: linear-gradient(90deg, #00ffaa, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #claim-btn {
      margin-top: 2.5rem;
      padding: 1.3rem 4rem;
      font-size: 1.9rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(45deg, #00c853, #76ff03);
      border: none;
      border-radius: 999px;
      box-shadow: 0 12px 35px rgba(100,221,23,0.6);
      cursor: pointer;
      transition: all 0.35s;
    }

    #claim-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 18px 50px rgba(100,221,23,0.8);
    }

    footer {
      position: absolute;
      bottom: 1.2rem;
      opacity: 0.65;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <h1>Крути колесо удачи!</h1>

  <div id="wheel-container">
    <div class="pointer"></div>
    <div id="wheel"></div>
  </div>

  <button id="spin-btn">Крутить</button>

  <div id="result"></div>

  <div id="congrats">
    <h2>Поздравляем!</h2>
    <p style="font-size:1.7rem; max-width:640px; line-height:1.4;">
      Ты выиграл <span id="final-prize" style="color:#00ffaa; font-weight:bold;">100 000 рупий</span>!
    </p>
    <button id="claim-btn">Забрать приз сейчас!</button>
  </div>

  <footer>2026 © Traff</footer>

  <script>
    const prizes = [
      "0 рупий",
      "1 000 рупий",
      "10 000 рупий",
      "100 000 рупий",
      "iPhone 17 PRO MAX",
      "Подписка Netflix"
    ];

    // Фиксированная последовательность (индексы призов)
    const sequence = [0, 2, 3]; // 0 → 10к → 100к

    let spinCount = 0;
    let isSpinning = false;

    const wheel = document.getElementById("wheel");
    const spinBtn = document.getElementById("spin-btn");
    const resultEl = document.getElementById("result");
    const congrats = document.getElementById("congrats");
    const claimBtn = document.getElementById("claim-btn");
    const finalPrizeEl = document.getElementById("final-prize");

    function createWheel() {
      wheel.innerHTML = "";
      const degPerSlice = 360 / prizes.length;

      prizes.forEach((prize, i) => {
        const slice = document.createElement("div");
        slice.className = "slice";
        slice.style.transform = `rotate(${i * degPerSlice}deg)`;
        
        // Цвета посветлее/потемнее для контраста
        const hue = (i * 60) % 360;
        slice.style.background = `hsl(${hue}, 85%, 55%)`;

        const text = document.createElement("div");
        text.className = "slice-text";
        text.textContent = prize;
        slice.appendChild(text);

        wheel.appendChild(slice);
      });
    }

    createWheel();

    function getRandomOffset(max = 20) {
      return Math.random() * max * 2 - max;
    }

    spinBtn.addEventListener("click", () => {
      if (isSpinning || spinCount >= 3) return;
      isSpinning = true;
      spinBtn.disabled = true;

      const winIndex = sequence[spinCount];
      const spins = 5 + spinCount;           // больше оборотов с каждым разом
      const baseDeg = 360 * spins;
      const sliceDeg = 360 / prizes.length;
      const centerOfSlice = winIndex * sliceDeg + sliceDeg / 2;
      const randomOffset = getRandomOffset(18);
      const finalDeg = baseDeg + (360 - centerOfSlice + randomOffset);

      wheel.style.transform = `rotate(${finalDeg}deg)`;

      setTimeout(() => {
        const won = prizes[winIndex];
        resultEl.textContent = `Выпало: ${won} 🎉`;

        spinCount++;

        if (spinCount >= 3) {
          setTimeout(() => {
            finalPrizeEl.textContent = "100 000 рупий";
            congrats.style.display = "flex";
          }, 1600);
        } else {
          spinBtn.disabled = false;
        }

        isSpinning = false;
      }, 5200);
    });

    claimBtn.addEventListener("click", () => {
      // ← Замени на свою ссылку
      window.location.href = "https://t.me/твой_ник_или_бот";
    });
  </script>

</body>
</html>
