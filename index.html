<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reliance Digital — Spin & Unlock</title>
  <style>
    :root {
      --blue: #1d4ed8;
      --red: #dc2626;
      --purple: #7c3aed;
      --pink: #ec4899;
      --gold: #f59e0b;
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #eef3f9, #ffffff);
      color: #0f172a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { max-width: 100%; padding: 16px; }

    /* ====================== ПЕРВОЕ ОКНО ====================== */
    .offer-entry-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(7,17,31,0.75); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .offer-entry-modal {
      width: 100%; max-width: 380px; border-radius: 32px; overflow: hidden;
      background: white; box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    }

    .offer-entry-top {
      padding: 32px 24px 20px; text-align: center;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      color: white;
    }

    .offer-entry-top h2 { font-size: 28px; line-height: 1.1; margin-bottom: 12px; }
    .offer-entry-top p { font-size: 16px; opacity: 0.95; }

    .big-unlock-btn {
      width: 100%; padding: 22px; font-size: 22px; font-weight: 900;
      border: none; border-radius: 24px; color: white;
      background: linear-gradient(135deg, #f59e0b, #ec4899, #dc2626);
      box-shadow: 0 12px 40px rgba(236,72,153,0.4);
      margin-top: 20px;
      transition: all 0.3s;
    }

    .big-unlock-btn:active { transform: scale(0.95); }

    /* ====================== КОЛЕСО ====================== */
    .hero-wheel {
      background: rgba(255,255,255,0.95); border-radius: 28px;
      padding: 20px 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .wheel-topbar { text-align: center; margin-bottom: 16px; }
    .status-chip {
      display: inline-block; padding: 8px 16px; background: #dbeafe;
      color: #1d4ed8; font-weight: 800; border-radius: 999px; font-size: 14px;
    }

    .reel-viewport {
      height: 220px; overflow: hidden; border-radius: 20px;
      position: relative; background: #f8fafc;
    }

    .reel-track {
      display: flex; align-items: center; gap: 16px;
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      transition: transform 5.2s cubic-bezier(0.12, 0.84, 0.18, 1);
    }

    .reel-card {
      width: 160px; height: 160px; flex-shrink: 0;
      background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 12px;
    }

    .reel-card .reel-icon { font-size: 42px; margin-bottom: 8px; }
    .reel-card .reel-title { font-size: 18px; font-weight: 900; }
    .reel-card .reel-sub { font-size: 13px; color: #64748b; }

    .reel-focus {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 170px; height: 170px; border: 4px solid #1d4ed8;
      border-radius: 28px; pointer-events: none; z-index: 10;
      box-shadow: 0 0 0 8px rgba(29,78,216,0.15);
    }

    .spin-btn {
      width: 100%; margin-top: 20px; padding: 18px;
      font-size: 19px; font-weight: 900; border: none; border-radius: 20px;
      background: linear-gradient(135deg, #1d4ed8, #dc2626);
      color: white; box-shadow: 0 10px 30px rgba(29,78,216,0.3);
    }

    /* ====================== ФОРМА ====================== */
    .summary {
      display: none; margin-top: 30px; padding: 24px; border-radius: 28px;
      background: white; box-shadow: 0 15px 50px rgba(0,0,0,0.1);
    }

    .summary h3 { font-size: 26px; margin-bottom: 12px; text-align: center; }

    .lead-form input,
    .lead-form select {
      width: 100%; padding: 16px; margin-bottom: 16px; border: 2px solid #e2e8f0;
      border-radius: 16px; font-size: 17px;
    }

    .lead-form label {
      font-weight: 700; font-size: 15px; margin-bottom: 6px; display: block;
    }

    .btn-big {
      width: 100%; padding: 20px; font-size: 20px; font-weight: 900;
      border: none; border-radius: 20px; margin: 12px 0;
      color: white;
    }

    .btn-unlock { background: linear-gradient(135deg, #1d4ed8, #7c3aed, #ec4899); }
    .btn-reward { background: linear-gradient(135deg, #f59e0b, #dc2626); }

    .footer-note {
      text-align: center; color: #64748b; font-size: 13px; margin-top: 40px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- ПЕРВОЕ ОКНО -->
    <div class="offer-entry-overlay" id="offerEntryOverlay">
      <div class="offer-entry-modal">
        <div class="offer-entry-top">
          <h2>Ваше персональное предложение<br>от Reliance Digital</h2>
          <p>Прокрутите колесо 3 раза и получите скидку, доставку и крутой подарок!</p>
        </div>
        <div class="offer-entry-body">
          <button class="big-unlock-btn" id="startOfferBtn">
            Unlock my offer
          </button>
        </div>
      </div>
    </div>

    <!-- КОЛЕСО -->
    <div class="hero-wheel" id="spinZone">
      <div class="wheel-topbar">
        <div class="status-chip" id="statusChip">Spin 1 of 3</div>
      </div>

      <div class="reel-viewport">
        <div class="reel-focus"></div>
        <div class="reel-track" id="reelTrack"></div>
      </div>

      <button class="spin-btn" id="spinBtn">Spin Now</button>
    </div>

    <!-- ФОРМА ПОСЛЕ 3 СПИНА -->
    <div class="summary" id="summary">
      <h3>Ваше предложение готово!</h3>
      <p>Заполните данные, чтобы курьер связался с вами</p>

      <form class="lead-form" id="leadForm">
        <label>Имя <span style="color:red">*</span></label>
        <input type="text" name="firstName" required placeholder="Введите имя">

        <label>Фамилия <span style="color:red">*</span></label>
        <input type="text" name="lastName" required placeholder="Введите фамилию">

        <label>Возраст</label>
        <input type="number" name="age" placeholder="Ваш возраст">

        <label>Номер телефона <span style="color:red">*</span></label>
        <input type="tel" name="phone" required placeholder="+7 (___) ___-__-__">

        <label>Адрес доставки <span style="color:red">*</span></label>
        <input type="text" name="address" required placeholder="Город, улица, дом, квартира">

        <label>Удобное время доставки</label>
        <select name="deliveryTime">
          <option value="">Выберите время</option>
          <option value="9-12">9:00 – 12:00</option>
          <option value="12-15">12:00 – 15:00</option>
          <option value="15-18">15:00 – 18:00</option>
          <option value="18-21">18:00 – 21:00</option>
          <option value="any">В любое время</option>
        </select>

        <button type="submit" class="btn-big btn-unlock">Unlock my offer</button>
        <button type="button" class="btn-big btn-reward" id="getRewardBtn">Get my reward →</button>
      </form>
    </div>

    <div class="footer-note">Reliance Digital • Мобильная версия</div>
  </div>

  <script>
    const stages = [
      {
        type: 'discount',
        label: 'First spin reveals your discount',
        chip: 'Spin 1 of 3',
        options: ['50%', '55%', '60%', '65%', '70%', '75%', '80%']
      },
      {
        type: 'delivery',
        label: 'Second spin reveals your delivery benefit',
        chip: 'Spin 2 of 3',
        options: ['Free Delivery', 'Priority Delivery', 'Same Day Delivery', 'Express Upgrade']
      },
      {
        type: 'reward',
        label: 'Final spin reveals your tech reward',
        chip: 'Spin 3 of 3',
        options: [
          { name: 'iPhone 16 Pro Max', emoji: '📱', img: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=400&q=80' },
          { name: 'PlayStation 5', emoji: '🎮', img: 'https://images.unsplash.com/photo-1606813907291-d86efa9b94db?auto=format&fit=crop&w=400&q=80' },
          { name: 'AirPods Pro', emoji: '🎧', img: 'https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?auto=format&fit=crop&w=400&q=80' },
          { name: 'Apple Watch', emoji: '⌚', img: 'https://images.unsplash.com/photo-1579586337278-3f436f25d4d6?auto=format&fit=crop&w=400&q=80' },
          { name: 'Samsung Galaxy Ultra', emoji: '📱', img: 'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?auto=format&fit=crop&w=400&q=80' },
          { name: 'iPad Air', emoji: '💻', img: 'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=400&q=80' }
        ]
      }
    ];

    let stageIndex = 0;
    const results = {};

    const reelTrack = document.getElementById('reelTrack');
    const spinBtn = document.getElementById('spinBtn');
    const statusChip = document.getElementById('statusChip');
    const summary = document.getElementById('summary');
    const offerEntryOverlay = document.getElementById('offerEntryOverlay');

    function getCardHTML(item) {
      if (typeof item === 'string') {
        return `<div class="reel-title">${item}</div>`;
      } else {
        return `
          <div class="reel-icon">${item.emoji}</div>
          <div class="reel-title">${item.name}</div>
        `;
      }
    }

    function renderReel(stage) {
      reelTrack.innerHTML = '';
      const options = stages[stage].options;
      const repeated = [...options, ...options, ...options, ...options];

      repeated.forEach(item => {
        const card = document.createElement('div');
        card.className = 'reel-card';
        card.innerHTML = getCardHTML(item);
        reelTrack.appendChild(card);
      });
    }

    function spinStage() {
      const stage = stages[stageIndex];
      const options = stage.options;
      const winnerIndex = Math.floor(Math.random() * options.length);
      const winner = options[winnerIndex];

      // Точное центрирование выигравшего приза
      const cardWidth = 176; // 160px + gap 16px
      const totalCards = options.length * 4;
      const targetPosition = (totalCards / 2) + winnerIndex;
      const offset = -(targetPosition * cardWidth) + (window.innerWidth / 2 - 80);

      spinBtn.disabled = true;
      spinBtn.textContent = 'Spinning...';
      reelTrack.style.transition = 'transform 5.2s cubic-bezier(0.12, 0.84, 0.18, 1)';
      reelTrack.style.transform = `translateX(${offset}px)`;

      setTimeout(() => {
        results[stage.type] = winner;

        stageIndex++;

        if (stageIndex < 3) {
          statusChip.textContent = `Spin ${stageIndex + 1} of 3`;
          spinBtn.disabled = false;
          spinBtn.textContent = 'Spin Again';
          renderReel(stageIndex);
        } else {
          // После третьего спина
          document.getElementById('spinZone').style.display = 'none';
          summary.style.display = 'block';
        }
      }, 5400);
    }

    // Запуск
    window.addEventListener('load', () => {
      offerEntryOverlay.style.display = 'flex';
      renderReel(0);
    });

    document.getElementById('startOfferBtn').addEventListener('click', () => {
      offerEntryOverlay.style.display = 'none';
    });

    spinBtn.addEventListener('click', spinStage);

    // Форма
    document.getElementById('leadForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('✅ Спасибо! Данные отправлены. Курьер свяжется с вами в ближайшее время!');
    });

    document.getElementById('getRewardBtn').addEventListener('click', () => {
      alert('🎉 Ваш выигрыш сохранён! Мы свяжемся с вами для подтверждения.');
    });
  </script>
</body>
</html>
