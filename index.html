<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reliance Digital — Spin & Unlock</title>
  <style>
    :root {
      --bg: #eef3f9;
      --card: rgba(255,255,255,0.88);
      --text: #0f172a;
      --muted: #5b677a;
      --blue: #1d4ed8;
      --red: #dc2626;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #ffffff);
      min-height: 100vh;
    }
    .container { padding: 16px; max-width: 100%; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-radius: 20px;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
      box-shadow: var(--shadow); position: sticky; top: 12px; z-index: 30;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--red));
      color: white; font-weight: 900; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .language-selector {
      padding: 8px 12px; border-radius: 999px; border: 1px solid #ddd;
      background: white; font-size: 14px; font-weight: 600; cursor: pointer;
    }

    .hero-wheel {
      margin: 20px auto 0;
      padding: 20px 16px 24px;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .reel-shell {
      position: relative;
      padding: 16px;
      background: radial-gradient(circle at 30% 20%, #ffffff, #edf3fb 60%, #d8e1ef);
      border-radius: 28px;
      box-shadow: inset 0 3px 0 rgba(255,255,255,0.9), 0 20px 50px rgba(15,23,42,0.15);
    }
    .reel-viewport {
      height: 220px;
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), #f1f5f9);
      position: relative;
    }
    .reel-track {
      display: flex;
      align-items: center;
      gap: 18px;
      position: absolute;
      left: 0; top: 50%;
      transform: translate3d(0, -50%, 0) translateZ(0);
      transition: transform 4.8s cubic-bezier(0.12, 0.84, 0.18, 1);
      padding: 0 200px;
      will-change: transform;
    }
    .reel-card {
      width: 162px; min-width: 162px; height: 162px;
      border-radius: 24px;
      background: white;
      border: 1px solid rgba(15,23,42,0.08);
      box-shadow: 0 12px 28px rgba(15,23,42,0.1);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 12px;
    }
    .reel-card .reel-icon { font-size: 40px; margin-bottom: 8px; }
    .reel-card .reel-img { width: 80px; height: 80px; object-fit: cover; border-radius: 18px; margin-bottom: 8px; display: none; }
    .reel-card .reel-title { font-size: 19px; font-weight: 900; line-height: 1.1; }
    .reel-card.product .reel-img { display: block; }
    .reel-card.product .reel-icon { display: none; }

    .reel-fade-left, .reel-fade-right {
      position: absolute; top: 0; bottom: 0; width: 80px; z-index: 3; pointer-events: none;
    }
    .reel-fade-left { left: 0; background: linear-gradient(90deg, #f8fafc, transparent); }
    .reel-fade-right { right: 0; background: linear-gradient(270deg, #f8fafc, transparent); }
    .reel-focus {
      position: absolute; top: 14px; bottom: 14px; left: 50%; width: 178px;
      transform: translateX(-50%);
      border-radius: 28px;
      border: 3px solid rgba(29,78,216,0.25);
      box-shadow: 0 0 0 8px rgba(29,78,216,0.08);
      z-index: 4; pointer-events: none;
    }

    .control-row { margin-top: 22px; text-align: center; }
    .stage-label { font-size: 15px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
    .spin-btn {
      width: 100%; max-width: 320px; padding: 18px;
      font-size: 18px; font-weight: 900; color: white;
      border: none; border-radius: 18px;
      background: linear-gradient(135deg, var(--blue), var(--red));
      box-shadow: 0 14px 32px rgba(29,78,216,0.25);
      cursor: pointer;
    }
    .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-dots { display: flex; gap: 12px; margin-top: 28px; }
    .dot-card {
      flex: 1; padding: 16px 10px; border-radius: 22px;
      background: white; border: 1px solid rgba(15,23,42,0.1);
      text-align: center;
    }
    .dot-card.active { transform: translateY(-5px); box-shadow: 0 16px 32px rgba(15,23,42,0.13); border-color: var(--blue); }
    .dot-circle {
      width: 84px; height: 84px; margin: 0 auto 10px;
      border-radius: 50%; background: linear-gradient(#fff, #edf3fb);
      border: 1px solid rgba(15,23,42,0.1);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }

    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.9); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
      background: white; border-radius: 28px; width: 100%; max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    .modal-header { padding: 24px; text-align: center; border-bottom: 1px solid #f1f1f1; }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 14.5px; }
    input { width: 100%; padding: 15px 16px; border: 2px solid rgba(15,23,42,0.12); border-radius: 14px; font-size: 16px; }
    .btn-big {
      width: 100%; padding: 18px; font-size: 18px; font-weight: 900;
      border: none; border-radius: 18px; color: white; cursor: pointer;
    }
    .btn-unlock { background: linear-gradient(135deg, #1d4ed8, #7c3aed); }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">RD</div>
        <div class="brand-text">
          <strong>Reliance Digital</strong>
          <span>Spin to Win</span>
        </div>
      </div>
      <select id="langSelect" class="language-selector">
        <option value="ru">🇷🇺 Русский</option>
        <option value="en">🇬🇧 English</option>
        <option value="hi">🇮🇳 हिंदी</option>
        <option value="th">🇹🇭 ไทย</option>
        <option value="vi">🇻🇳 Tiếng Việt</option>
      </select>
    </header>

    <div class="hero-wheel">
      <div class="wheel-topbar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div>
          <h2 id="title" style="font-size:21px;">Reward Wheel</h2>
          <p id="subtitle" style="color:var(--muted);font-size:13.5px;">Крутите и собирайте призы</p>
        </div>
        <div id="statusChip" style="padding:8px 14px;border-radius:999px;background:rgba(29,78,216,0.1);color:var(--blue);font-weight:800;font-size:13px;">Spin 1 of 3</div>
      </div>

      <div class="reel-shell">
        <div class="reel-viewport" id="reelViewport">
          <div class="reel-fade-left"></div>
          <div class="reel-fade-right"></div>
          <div class="reel-focus"></div>
          <div class="reel-track" id="reelTrack"></div>
        </div>
      </div>

      <div class="control-row">
        <div class="stage-label" id="stageLabel">Первый спин — ваша скидка</div>
        <button class="spin-btn" id="spinBtn">Крутить сейчас</button>
      </div>

      <div class="result-dots">
        <div class="dot-card" id="dot1"><div class="dot-circle" id="circle1">%</div><h4 id="dotTitle1">Скидка</h4><p id="text1"></p></div>
        <div class="dot-card" id="dot2"><div class="dot-circle" id="circle2">🚚</div><h4 id="dotTitle2">Доставка</h4><p id="text2"></p></div>
        <div class="dot-card" id="dot3"><div class="dot-circle" id="circle3"><span id="rewardEmoji">🎁</span><img id="rewardImg" style="width:68px;height:68px;border-radius:16px;display:none;" alt=""></div><h4 id="dotTitle3">Приз</h4><p id="text3"></p></div>
      </div>
    </div>
  </div>

  <!-- Форма отдельным окном -->
  <div class="modal" id="formModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="formTitle">Ваше предложение готово!</h2>
        <p id="formSubtitle" style="color:#475569;margin-top:8px;">Заполните данные, и курьер свяжется с вами</p>
      </div>
      <div class="modal-body">
        <form id="leadForm">
          <div class="form-group">
            <label id="labelName">Имя <span style="color:#dc2626">*</span></label>
            <input type="text" name="firstName" required>
          </div>
          <div class="form-group">
            <label id="labelPhone">Телефон <span style="color:#dc2626">*</span></label>
            <input type="tel" name="phone" required>
          </div>
          <div class="form-group">
            <label id="labelAddress">Адрес доставки <span style="color:#dc2626">*</span></label>
            <input type="text" name="address" required>
          </div>
          <div style="margin-top:24px;">
            <button type="submit" class="btn-big btn-unlock">Получить предложение</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const translations = {
      ru: { title: "Reward Wheel", subtitle: "Крутите и собирайте призы", stage1: "Первый спин — ваша скидка", stage2: "Второй спин — доставка", stage3: "Финальный спин — ваш приз", dot1: "Скидка", dot2: "Доставка", dot3: "Приз", spinBtn: "Крутить сейчас", formTitle: "Ваше предложение готово!", formSubtitle: "Заполните данные, и курьер свяжется с вами", labelName: "Имя", labelPhone: "Телефон", labelAddress: "Адрес доставки" },
      en: { title: "Reward Wheel", subtitle: "Spin and collect prizes", stage1: "First spin — your discount", stage2: "Second spin — delivery", stage3: "Final spin — your prize", dot1: "Discount", dot2: "Delivery", dot3: "Prize", spinBtn: "Spin Now", formTitle: "Your offer is ready!", formSubtitle: "Fill the details and our courier will contact you", labelName: "Name", labelPhone: "Phone", labelAddress: "Delivery Address" },
      hi: { title: "रिवार्ड व्हील", subtitle: "घुमाएं और पुरस्कार जीतें", stage1: "पहला स्पिन — आपकी छूट", stage2: "दूसरा स्पिन — डिलीवरी", stage3: "अंतिम स्पिन — आपका पुरस्कार", dot1: "छूट", dot2: "डिलीवरी", dot3: "पुरस्कार", spinBtn: "अभी स्पिन करें", formTitle: "आपका ऑफर तैयार है!", formSubtitle: "विवरण भरें, कूरियर संपर्क करेगा", labelName: "नाम", labelPhone: "फ़ोन", labelAddress: "डिलीवरी पता" },
      th: { title: "วงล้อรางวัล", subtitle: "หมุนและรับรางวัล", stage1: "สปินแรก — ส่วนลดของคุณ", stage2: "สปินที่สอง — การจัดส่ง", stage3: "สปินสุดท้าย — รางวัลของคุณ", dot1: "ส่วนลด", dot2: "การจัดส่ง", dot3: "รางวัล", spinBtn: "หมุนเลย", formTitle: "ข้อเสนอของคุณพร้อมแล้ว!", formSubtitle: "กรอกข้อมูลเพื่อให้พนักงานส่งของติดต่อ", labelName: "ชื่อ", labelPhone: "โทรศัพท์", labelAddress: "ที่อยู่จัดส่ง" },
      vi: { title: "Bánh xe phần thưởng", subtitle: "Quay và nhận quà", stage1: "Vòng quay đầu — giảm giá của bạn", stage2: "Vòng quay thứ hai — giao hàng", stage3: "Vòng quay cuối — phần thưởng của bạn", dot1: "Giảm giá", dot2: "Giao hàng", dot3: "Phần thưởng", spinBtn: "Quay ngay", formTitle: "Ưu đãi của bạn đã sẵn sàng!", formSubtitle: "Điền thông tin để nhân viên giao hàng liên hệ", labelName: "Tên", labelPhone: "Điện thoại", labelAddress: "Địa chỉ giao hàng" }
    };

    let currentLang = 'ru';
    let stageIndex = 0;
    let isSpinning = false;
    let results = { discount: null, delivery: null, reward: null };

    const stages = [
      { type: 'discount', labelKey: 'stage1', options: ['50%', '55%', '60%', '65%', '70%', '75%', '80%'] },
      { type: 'delivery', labelKey: 'stage2', options: ['Бесплатная доставка', 'Доставка в день заказа', 'Приоритетная доставка', 'Экспресс'] },
      { type: 'reward', labelKey: 'stage3', options: [
        { name: 'iPhone 16 Pro Max', emoji: '📱', img: 'https://picsum.photos/id/1015/300/300' },
        { name: 'PlayStation 5', emoji: '🎮', img: 'https://picsum.photos/id/201/300/300' },
        { name: 'AirPods Pro 2', emoji: '🎧', img: 'https://picsum.photos/id/60/300/300' },
        { name: 'Samsung Galaxy S25', emoji: '📱', img: 'https://picsum.photos/id/106/300/300' }
      ]}
    ];

    function setLanguage(lang) {
      currentLang = lang;
      const t = translations[lang] || translations.ru;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('stageLabel').textContent = t[stages[stageIndex].labelKey];
      document.getElementById('dotTitle1').textContent = t.dot1;
      document.getElementById('dotTitle2').textContent = t.dot2;
      document.getElementById('dotTitle3').textContent = t.dot3;
      document.getElementById('spinBtn').textContent = t.spinBtn;
      document.getElementById('formTitle').textContent = t.formTitle;
      document.getElementById('formSubtitle').textContent = t.formSubtitle;
      document.getElementById('labelName').innerHTML = `${t.labelName} <span style="color:#dc2626">*</span>`;
      document.getElementById('labelPhone').innerHTML = `${t.labelPhone} <span style="color:#dc2626">*</span>`;
      document.getElementById('labelAddress').innerHTML = `${t.labelAddress} <span style="color:#dc2626">*</span>`;
    }

    function renderReel(stage) {
      const reelTrack = document.getElementById('reelTrack');
      reelTrack.innerHTML = '';
      const repeated = [...stage.options, ...stage.options, ...stage.options, ...stage.options];

      repeated.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = `reel-card ${typeof item === 'object' ? 'product' : ''}`;
        if (typeof item === 'object') {
          card.innerHTML = `<img class="reel-img" src="${item.img}" alt="${item.name}"><div class="reel-title">${item.name}</div>`;
        } else {
          card.innerHTML = `<div class="reel-icon">${stage.type === 'discount' ? '🏷️' : '🚚'}</div><div class="reel-title">${item}</div>`;
        }
        reelTrack.appendChild(card);
        if (i < repeated.length - 1) {
          const d = document.createElement('div'); d.style.width = '14px'; d.style.minWidth = '14px';
          reelTrack.appendChild(d);
        }
      });
    }

    function setStage(idx) {
      const stage = stages[idx];
      document.getElementById('stageLabel').textContent = translations[currentLang][stage.labelKey];
      document.getElementById('statusChip').textContent = `Spin ${idx + 1} of 3`;
      renderReel(stage);
    }

    function updateDot(stage, value) {
      if (stage.type === 'discount') {
        document.getElementById('dot1').classList.add('active');
        document.getElementById('circle1').textContent = value;
        document.getElementById('text1').textContent = value + " OFF";
      }
      if (stage.type === 'delivery') {
        document.getElementById('dot2').classList.add('active');
        document.getElementById('text2').textContent = value;
      }
      if (stage.type === 'reward') {
        document.getElementById('dot3').classList.add('active');
        document.getElementById('rewardEmoji').style.display = 'none';
        const img = document.getElementById('rewardImg');
        img.src = value.img; img.style.display = 'block';
        document.getElementById('text3').textContent = value.name;
      }
    }

    function spinStage() {
      if (isSpinning) return;
      isSpinning = true;

      const stage = stages[stageIndex];
      const options = stage.options;
      const winnerIndex = Math.floor(Math.random() * options.length);
      const winner = options[winnerIndex];

      const reelTrack = document.getElementById('reelTrack');
      const cards = Array.from(reelTrack.querySelectorAll('.reel-card'));
      const baseIndex = options.length * 2 + winnerIndex;   // надёжная позиция для 3-х этапов
      const targetCard = cards[baseIndex];

      if (!targetCard) {
        isSpinning = false;
        return;
      }

      const viewportWidth = document.getElementById('reelViewport').clientWidth;
      const cardCenter = targetCard.offsetLeft + targetCard.offsetWidth / 2;
      const targetX = viewportWidth / 2 - cardCenter;

      const spinBtn = document.getElementById('spinBtn');
      spinBtn.disabled = true;
      document.getElementById('statusChip').textContent = currentLang === 'ru' ? 'Крутим...' : 'Spinning...';

      reelTrack.style.transition = 'transform 4.8s cubic-bezier(0.12, 0.84, 0.18, 1)';
      reelTrack.style.transform = `translate3d(${targetX}px, -50%, 0) translateZ(0)`;

      setTimeout(() => {
        results[stage.type] = winner;
        updateDot(stage, winner);

        stageIndex++;

        if (stageIndex < stages.length) {
          setStage(stageIndex);
          spinBtn.disabled = false;
          spinBtn.textContent = translations[currentLang].spinBtn;
        } else {
          // Завершён 3-й спин
          document.getElementById('statusChip').textContent = 'Готово!';
          document.getElementById('stageLabel').textContent = translations[currentLang].stage3;
          spinBtn.textContent = translations[currentLang].spinBtn === 'Крутить сейчас' ? 'Показать предложение' : 'Show Offer';
          spinBtn.disabled = false;

          // Показываем форму
          document.getElementById('formModal').style.display = 'flex';
        }
        isSpinning = false;
      }, 4900);
    }

    // Инициализация
    window.addEventListener('load', async () => {
      let detected = 'ru';
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        const c = data.country_code || '';
        if (c === 'IN') detected = 'hi';
        else if (c === 'TH') detected = 'th';
        else if (c === 'VN') detected = 'vi';
      } catch(e) {}
      setLanguage(detected);

      setStage(0);

      document.getElementById('spinBtn').addEventListener('click', spinStage);

      document.getElementById('langSelect').addEventListener('change', e => setLanguage(e.target.value));

      document.getElementById('leadForm').addEventListener('submit', e => {
        e.preventDefault();
        alert(currentLang === 'ru' ? '✅ Спасибо! Данные отправлены.' : '✅ Thank you! Data sent.');
        document.getElementById('formModal').style.display = 'none';
      });
    });
  </script>
</body>
</html>
